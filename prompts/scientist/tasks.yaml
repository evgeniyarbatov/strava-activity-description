describe_scientist_run:
  description: |
    {activity_context}

    VARIATION
    {variation_prompt}

    TASK
    Draft a single-sentence factual description of this run.
    Use only the provided data; do not invent details that are not present.
  expected_output: "A single-sentence draft factual description of the run."
  agent: scientist
revise_scientist_with_personality:
  description: |
    DRAFT
    {draft_description}

    PERSONAL VOICE
    - Honest and independent; avoid hype, cliches, or groupthink.
    - Direct and pragmatic; concise, results-oriented phrasing.
    - Structured but natural; clear sentences without rigid formula.
    - Quiet and private; warm one-on-one tone, not performative.
    - Detail-aware and risk-sensitive; no exaggeration, choose concrete details.
    - Grounded creativity; one precise image is enough.

    TASK
    Revise the draft to sound distinctly human and like the author while preserving the
    factual tone, first-person present tense, and single-sentence length.
    Keep the same facts and imagery; do not add new metrics or locations.
    Do not invent details that are not present in the data.
  expected_output: "A single-sentence revised description in the scientist style and personal voice."
  agent: personality_editor
